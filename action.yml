name: "rust-thanks-action"
description: "Generate badge URLs and SVG cards from Rust Thanks"
author: "Yuki Okushi"
branding:
  icon: "award"
  color: "green"
inputs:
  name:
    required: true
    description: "A name listed in Rust Thanks"
  format:
    required: false
    default: "svg"
    description: "Output format: svg, badge, or both"
  output-path:
    required: false
    default: "rust-thanks-card.svg"
    description: "Where to write the generated SVG when format includes svg"
  avatar-url:
    required: false
    default: ""
    description: "Optional avatar image URL to embed in the SVG card"
  title:
    required: false
    default: "Rust Contribution Stats"
    description: "Headline shown in the SVG card"
  theme:
    required: false
    default: "rust"
    description: "Card theme: rust, light, or slate"
  commit-message:
    required: false
    default: "Update Rust Thanks card"
    description: "Commit message used when push-changes is true"
  push-changes:
    required: false
    default: "false"
    description: "Whether to push the generated commit to a remote branch"
  push-branch:
    required: false
    default: ""
    description: "Branch to push to. Defaults to GITHUB_HEAD_REF or GITHUB_REF_NAME"
  remote-name:
    required: false
    default: "origin"
    description: "Git remote name used when push-changes is true"
  github-token:
    required: false
    default: ${{ github.token }}
    description: "GitHub token used to configure an authenticated push URL"
  git-user-name:
    required: false
    default: "github-actions[bot]"
    description: "Git author name used when push-changes is true"
  git-user-email:
    required: false
    default: "41898282+github-actions[bot]@users.noreply.github.com"
    description: "Git author email used when push-changes is true"
  write-readme:
    required: false
    default: "false"
    description: "Whether to replace a local README marker block with the generated snippet"
  readme-path:
    required: false
    default: "README.md"
    description: "README path to update when write-readme is true"
  readme-marker:
    required: false
    default: "rust-thanks-card"
    description: "Marker name used as START_SECTION/END_SECTION suffix"
outputs:
  name:
    description: "Matched name from Rust Thanks"
  rank:
    description: "Numeric rank from Rust Thanks"
  ordinal-rank:
    description: "Ordinal rank such as 1st or 42nd"
  contributions:
    description: "Contribution count from Rust Thanks"
  badge-url:
    description: "Generated shields.io badge URL"
  committed:
    description: "Whether this action created a commit"
  commit-sha:
    description: "Commit SHA when push-changes created a commit"
  pushed:
    description: "Whether this action pushed the generated commit"
  pushed-ref:
    description: "Remote ref updated when push-changes succeeds"
  svg:
    description: "Generated SVG markup when format includes svg"
  svg-path:
    description: "Absolute path to the generated SVG file when format includes svg"
  readme-snippet:
    description: "Snippet written into README when write-readme is enabled"
runs:
  using: "node24"
  main: "dist/index.js"
